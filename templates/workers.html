<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Сотрудники | Dilmurat Group</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">Dilmurod Group System</a>
            <div>
                <a href="/workers" class="btn btn-outline-light btn-sm">Сотрудники</a>
                <a href="/tabel" class="btn btn-outline-light btn-sm">Табель</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <h3>Управление сотрудниками</h3>
        
        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <h5>Массовое добавление / Обновление</h5>
                <form method="POST">
                    <textarea name="bulk_workers" class="form-control mb-2" rows="5" placeholder="ID[TAB]ФИО[TAB]Категория[TAB]Отдел&#10;Пример:&#10;5	Иванов Иван	5	Qiyma&#10;7	Петров Петр	4	Kesib"></textarea>
                    <button type="submit" class="btn btn-primary">Сохранить список</button>
                </form>
            </div>
        </div>

        <table class="table table-bordered table-striped bg-white shadow-sm">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>ФИО</th>
                    <th>Категория</th>
                    <th>Отдел</th>
                    <th>Действие</th>
                </tr>
            </thead>
            <tbody>
                {% for worker in workers %}
                <tr>
                    <td>{{ worker.worker_id }}</td>
                    <td>{{ worker.fio }}</td>
                    <td>{{ worker.category }}</td>
                    <td>{{ worker.otdel }}</td>
                    <td>
                        <a href="{{ url_for('delete_worker', id=worker.id) }}" 
                           class="btn btn-danger btn-sm" 
                           onclick="return confirm('Удалить сотрудника?')">Удалить</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
