services:
  - type: web
    name: worker-kpd
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bank_db_1wkx
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: bank_db_1wkx
    plan: free
    region: virginia